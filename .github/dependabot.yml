version: 2

updates:
  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: "/xene-frontend"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "frontend"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      non-critical-frontend:
        update-types:
          - minor
          - patch

  # Backend Python dependencies
  - package-ecosystem: pip
    directory: "/xene-backend"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      non-critical-backend:
        update-types:
          - minor
          - patch

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
