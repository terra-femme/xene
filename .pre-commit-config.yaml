repos:
  # 1. detect-secrets — catches API keys, tokens, passwords in any language
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '(\.secrets\.baseline|xene-frontend/node_modules/.*|xene-backend/venv/.*|\.env\.example)'

  # 2. bandit — Python SAST (backend only)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-ll']
        files: '^xene-backend/.*\.py$'
        exclude: '^xene-backend/(venv|tests)/'
        additional_dependencies: ['bandit[toml]']

  # 3. Standard hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']

  # 4. Safety — Python dependency CVE check (backend)
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        files: 'xene-backend/requirements.*\.txt$'
